<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<Style>
    .parent{
        width: 100%;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 100px;
    }

    button{
        border-style: none;
        border-radius: 10px;
        font-size: 20px;
        color: aliceblue;
        transition: all 0.3s ease-in-out;
    }
    button:hover{
        /* transform: scale(1.1); */
        /* transform: rotate(9960deg); */
        transform: translate(120px);

    }
 .btn1{
        width: 200px;
        height: 50px;
        background-color: brown;
    }
    .btn2{
        width: 200px;
        height: 50px;
        background-color: darkcyan;
    }
</Style>
<body>
    <div class="parent">
        <button class="btn1">Button1</button>
        <button class="btn2">Button2</button>
    </div>
</body>
</html>
