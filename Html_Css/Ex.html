<!DOCTYPE html>
<html>
<head>
<style>
body {
  background: #e6e1f5;
  display: flex;
  justify-content: center;
  align-items: center;
     padding: 50px;
  font-family: Arial;
}

.card {
  width: 280px;
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.top {
  background: #7b6fd6;
  text-align: center;
  padding: 20px;
   height: 200px;
}

.top img {
  width: 150px;
 
}

.content {
  padding: 15px;
}

h3 {
  margin: 5px 0;
}

p {
  font-size: 13px;
  color: gray;
}

.bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

button {
  background: #7b6fd6;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="card">
  <div class="top">
    <img src="https://i.pinimg.com/1200x/40/4d/7e/404d7e60392301e011b9ef2bb58d8e46.jpg">
  </div>

  <div class="content">
    <h3>Nike Running Shoe</h3>
    <p>Comfortable and stylish running shoe.</p>

    <div class="bottom">
      <strong>$69.99</strong>
      <button>Add</button>
    </div>
  </div>
</div>

</body>
</html>
