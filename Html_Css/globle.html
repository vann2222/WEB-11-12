<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .card{
        border-radius: 10px;
        border: 2px solid black;
        width: 300px;
        height:450px;
        margin: auto;
        padding: 40px;
        margin-top: 50px;
        background-color: antiquewhite;
    }
    .card-img{
        width: 100%;
        height: 60%;
        border-radius: 10px;
        background-color: rgb(69, 42, 9);

    }
    .card-img img{
        width: 100%;
        border-radius: 10px;
    }
    p{
        font-size: 23px;
        font-weight: bold;
    }
    button{
        width: 110px;
        height: 40px;
        background-color: rgb(27, 25, 146);
        color: rgb(254, 253, 255);
        font-size: 15px;
        border-style: none;
        border-radius: 10px;
    }

</style>
<body>
    <div class="card">
        <div class="card-img">
            <img src="https://i.pinimg.com/736x/a6/0b/54/a60b540bd1fa738783f4e995a7e07902.jpg" alt="">
        </div>
        <br>
        <p>Iphone  </p>
        <p>Price 1000$</p>
        <button>Add card</button>
    </div>

    
</body>
</html>
