<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .parent{
        width: 300px;
        height: 300px;
        background-color: rgb(134, 98, 119);
        position: relative;
    }
    .box1{
        width: 100px;
        height: 100px;
        background-color: rgb(194, 103, 103);
        position: absolute;
        z-index: 1;
    }
    .box2{
        width: 100px;
        height: 100px;
        background-color: rgb(91, 66, 47);
        position: absolute;
        z-index: 0;
    }
</style>
<body>
    <div class="parent">
        <div class="box1"></div>
        <div class="box2"></div>
    </div>
</body>
</html>
