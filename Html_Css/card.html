<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    .card{
        width: 500px;
        height: 650px;
        background-color: antiquewhite;
        border-radius: 10px;
        margin: 40px auto;
        position: relative;
        background-position: center;
        background-image: url("https://i.pinimg.com/originals/76/a6/a5/76a6a50ac6e5fb78bd069557ba6f2a83.png");
        box-shadow: rgba(17, 17, 26, 0.1) 0px 4px 16px, rgba(17, 17, 26, 0.1) 0px 8px 24px, rgba(17, 17, 26, 0.1) 0px 16px 56px;
    }
    .profile{
        width: 200px;
        height: 200px;
        position: absolute;
        top: 150px;
        right: 150px;
        
    }
    .profile img{
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 1px solid rgb(42, 9, 20);
    }
    .card h1{
        position: absolute;
        bottom: 250px;
        right: 190px;
        color: rgb(68, 34, 22);
        box-shadow: rgba(17, 17, 26, 0.1) 0px 4px 16px, rgba(17, 17, 26, 0.1) 0px 8px 24px, rgba(17, 17, 26, 0.1) 0px 16px 56px;
    }
     .online{
        width: 25px;
        height: 25px;
        position: absolute;
        right: 170px;
        bottom: 310px;
        border-radius: 50%;
        border: 1px solid rgb(17, 12, 13);
        background-color: rgb(50, 153, 50);
     }

</style>
<body>
    <div class="card">
        <div class="profile">
        <img src="https://i.pinimg.com/736x/f4/35/85/f4358576ef07465c85f7038eb2e61582.jpg" alt="">
        </div>
        <div class="online"></div>
        <h1>Sakuraa </h1>
    </div>
</body>
</html>
