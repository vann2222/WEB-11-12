<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" 
    crossorigin="anonymous" 
    referrerpolicy="no-referrer" />
    <title>Document</title>
</head>
    <style>
    *{
       margin: 0;
        padding: 0;
       box-sizing: border-box;
    }
    .form-img{
        width: 1300px;
        height: 1500px;
        margin: auto;
        margin-top: 50px;
        padding: 50px;
        background-repeat: no-repeat;
        background-size: contain;
        background-image: url("https://i.pinimg.com/736x/e5/f2/d5/e5f2d5ae8cd185efa6656bc91cf27edd.jpg");
    }
    .form{
        width: 380px;
        height: 480px;
        margin: auto;
        padding: 50px;
        backdrop-filter: blur(9px);
        border-radius: 20px;
        box-shadow: rgb(38, 57, 77) 0px 20px 30px -10px;
    }
    .form h4{
        color: white;
    }
    .form input{
        width: 100%;
        height: 30px;
        padding: 5px 10px;
        border-radius: 5px;
        outline: none;
        border: 1px solid rgb(249, 247, 247);
        background-color: rgba(249, 248, 248, 0.095);
        color: white;
    }
    ::placeholder{
        color:white;
    }
    .checkbook{
    width: 100%;
    color: white;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    }
    .checkbook input{
        width: 20px;
       
    }
    .form button{
        margin-top: 20px;
        margin-left: 80px;
        width: 100px;
        height: 29px;
        background-color: rgba(111, 166, 168, 0.586);
        border-radius: 10px;
        border-style: none;
        color: white;
       box-shadow: rgba(0, 0, 0, 0.25) 0px 54px 55px, 
       rgba(0, 0, 0, 0.12) 0px -12px 30px, rgba(0, 0, 0, 0.12) 0px 4px 6px,
        rgba(0, 0, 0, 0.17) 0px 12px 13px, rgba(0, 0, 0, 0.09) 0px -3px 5px;
    }
   .form h5{
        color: white;
        margin-top: 5px;
        margin-left: 50px;
        
    }
    h1{
        color: white;
        background-color: rgba(255, 228, 196, 0.28);
        margin-left: 380px;
        margin-top: 10px;
        backdrop-filter: blur(10px);
        width: 450px;
    }
    .socialIcon{
        margin-top: 5px;
        margin-left: 100px;
        
    }
    .fa-facebook {
        color: blue;
    }
    .fa-tiktok{
        background-color: black;
        border-radius: 10px;
        color: white;
    }
    .fa-youtube{
        color: red;
    }
    </style>
<body>
    <div class="form-img">   
        <h1>Wellcome! Let's Get You Started</h1>     
        <br><br>
        <div class="form">
            <h4>Username</h4>
            <input type="text" placeholder="@Vann1234">
            <br><br>
            <h4>Email</h4>
            <input type="email" placeholder="ormtavann@gmial.com">
            <br><br>
            <h4>Password</h4>
            <input type="password" placeholder="Vann1234">
            <br><br>
            <h4>Comfirm Password</h4>
            <input type="password" placeholder="Vann1234">
            <br><br>
            <div class="checkbook">
                <input type="checkbox">
                <label>Remember me<label>
            </div>
            <button>Register</button>
            <h5>login soicial media account!</h5>
            <div class="socialIcon">
                <i class="fa-brands fa-facebook"></i>
                <i class="fa-brands fa-tiktok"></i>
                <i class="fa-brands fa-youtube"></i>
            </div>
        </div>     
    </div>
</body>
</html>
