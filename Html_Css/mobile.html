<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
  margin: 0;
  padding: 10px;
  box-sizing: border-box;
  font-family: "Inter", sans-serif;
}

body {
  background: #dcd4c1;
  color: #111;
}

.container {
  width: 1200px;
  height: 800px;
  margin: auto;
  padding: 20px;
  border: 1px solid black;
  
}
.profile {
  display: flex;
  align-items: center;
  margin-top: 30px;
  gap: 20px;
}

.profile-img {
  width: 120px;
  border-radius: 20px;
}
.profile-info h1 {
  font-size: 24px;
}
.badge {
  background: #6c63ff;
  color: white;
  font-size: 12px;
  padding: 2px 6px;
  border-radius: 6px;
  margin-left: 6px;
}
.buttons {
  margin-top: 10px;
}
.follow {
  background: black;
  color: white;
  padding: 8px 16px;
  border-radius: 8px;
  border: none;
}
.contact {
  margin-left: 10px;
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
  background: white;
}
.stats {
  margin-left: auto;
  display: flex;
  gap: 30px;
}
.stats div {
  text-align: center;
}
.stats span {
  display: block;
  font-size: 12px;
  color: #777;
}
.tabs {
  margin-top: 30px;
  border-bottom: 1px solid #ddd;
}
.tabs a {
  margin-right: 20px;
  padding-bottom: 10px;
  display: inline-block;
  color: #777;
}
.tabs .active {
  border-bottom: 2px solid black;
  color: black;
}
.projects {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 20px;
}

.card {
  background: #fff;
  padding: 12px;
  border-radius: 16px;
}
.card img {
  width: 100%;
  border-radius: 12px;
}
.card h3 {
  margin-top: 10px;
  font-size: 16px;
}
.card p {
  font-size: 13px;
  color: #777;
}
</style>
<body>
    <div  class="container">
    <section class="profile">
    <img src="https://i.pinimg.com/736x/0c/8e/db/0c8edbaa581694469feb1023060b7c43.jpg" class="profile-img"/>

    <div class="profile-info">
      <h1>Van Van <span class="badge">PRO</span></h1>
      <p>Interface and Brand Designer<br/>based in Cambodia</p>

      <div class="buttons">
        <button class="follow">Follow</button>
        <button class="contact">Get in touch</button>
      </div>
    </div>

    <div class="stats">
      <div><strong>2,985</strong><span>Followers</span></div>
      <div><strong>132</strong><span>Following</span></div>
      <div><strong>548</strong><span>Likes</span></div>
    </div>
  </section>

  <!-- Tabs -->
  <div class="tabs">
    <a class="active">Work</a>
    <a>Moodboards</a>
    <a>Likes</a>
    <a>About</a>
  </div>

  <!-- Projects -->
  <section class="projects">
    <div class="card">
      <img src="project1.jpg"/>
      <h3>VPN Mobile App</h3>
      <p>Mobile UI, Research</p>
    </div>

    <div class="card">
      <img src="project2.jpg"/>
      <h3>Property Dashboard</h3>
      <p>Web Interface</p>
    </div>

    <div class="card">
      <img src="project3.jpg"/>
      <h3>Healthcare Mobile App</h3>
      <p>Mobile UI, Branding</p>
    </div>
  </section>
  </div>
</body>
</html>
